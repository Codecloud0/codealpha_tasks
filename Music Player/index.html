<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player with JS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="player-container">

    <!-- Album Art -->
    <div class="album-art">
      <img id="albumImg" src="https://picsum.photos/seed/song1/400/400" alt="Album Art" />
    </div>

    <div class="player-main">
      <!-- Song Info -->
      <div class="song-info">
        <h2 id="songTitle">Song Title</h2>
        <p id="songArtist">Artist Name</p>
      </div>

      <!-- Progress Bar -->
      <div class="progress-container">
        <span id="currentTime">0:00</span>
        <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1" />
        <span id="duration">0:00</span>
      </div>

      <!-- Main Controls -->
      <div class="controls">
        <button id="shuffleBtn" title="Shuffle">🔀</button>
        <button id="prevBtn" title="Previous">⏮</button>
        <button id="playBtn" title="Play/Pause" class="play-btn">▶</button>
        <button id="nextBtn" title="Next">⏭</button>
        <button id="repeatBtn" title="Repeat">🔁</button>
      </div>
    </div>

    <div class="player-side">
      <!-- Volume Control -->
      <div class="volume-container">
        <span id="volIcon">🔊</span>
        <input type="range" id="volumeBar" value="50" min="0" max="100" />
      </div>

      <!-- Playlist Toggle -->
      <button id="playlistToggle" class="playlist-toggle">⇌ Show all</button>
    </div>

    <!-- Playlist -->
    <div class="playlist" id="playlist"></div>

  </div>

  <audio id="audio"></audio>

  <script src="script.js"></script>
</body>
</html>
