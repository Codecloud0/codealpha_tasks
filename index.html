<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-top">
    <h1>My Photo Gallery</h1>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
      <span class="theme-icon">🌙</span>
    </button>
    </div>
    <p class="subtitle">A curated collection of beautiful images</p>
  </header>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="nature">Nature</button>
    <button class="filter-btn" data-filter="city">City</button>
    <button class="filter-btn" data-filter="abstract">Abstract</button>
    <button class="filter-btn" data-filter="space">Space</button>
  </div>

  <!-- Search bar -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by title or category..." />
  </div>

  <!-- Gallery grid -->
  <main class="gallery-grid" id="gallery"></main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">&#10005;</button>
    <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
    <div class="lb-content">
      <img src="" alt="" id="lbImg" />
      <div class="lb-info">
        <span class="lb-title" id="lbTitle"></span>
        <span class="lb-counter" id="lbCounter"></span>
      </div>
    </div>
    <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
  </div>

  <footer class="site-footer">
    <p>My Photo Gallery of 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
